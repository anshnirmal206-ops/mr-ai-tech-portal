<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MR AI TECH ANSH | Official Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #05050a;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .neon-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 2px solid #00f2ff;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
            border-radius: 25px;
            padding: 50px 30px;
            text-align: center;
            max-width: 450px;
            width: 90%;
        }
        .orbitron { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }
        .btn-main {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            border-radius: 12px;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            text-decoration: none;
            cursor: pointer;
        }
        .btn-blue { background: #00f2ff; color: #000; box-shadow: 0 0 15px #00f2ff; }
        .btn-blue:hover { transform: scale(1.03); box-shadow: 0 0 25px #00f2ff; }
        .btn-red { background: #ff0000; color: #fff; box-shadow: 0 0 15px #ff0000; }
        .btn-red:hover { transform: scale(1.03); box-shadow: 0 0 25px #ff0000; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="login-page" class="neon-box">
        <h1 class="orbitron text-3xl mb-2 text-cyan-400">MR AI TECH ANSH</h1>
        <p class="text-xs text-gray-500 mb-8 tracking-widest">FUTURE OF AI EDITING</p>
        <p class="text-sm mb-6">Aapko aage badhne ke liye login karna hoga.</p>
        <button onclick="signInWithGoogle()" class="btn-main btn-blue">
            SIGN IN WITH GOOGLE
        </button>
    </div>

    <div id="dashboard" class="neon-box hidden">
        <h2 class="orbitron text-xl mb-1 text-white">DASHBOARD</h2>
        <p id="user-name" class="text-cyan-400 font-bold mb-8 italic"></p>
        
        <a href="https://drive.google.com/drive/folders/1qM21_U0wU3jyL1MFimTKtIadAyU_Vu1G?usp=sharing" target="_blank" class="btn-main btn-blue">
            📂 DOWNLOAD ALL PACKS
        </a>

        <a href="https://www.youtube.com/@Mr.AI_tech_ansh-t9h" target="_blank" class="btn-main btn-red">
            🔴 YOUTUBE CHANNEL
        </a>

        <button onclick="logout()" class="text-red-500 text-xs underline mt-8 opacity-70 hover:opacity-100">
            LOGOUT & EXIT
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCcaneVEU7cJGp_r_D9Il90fQchD7PN82o",
            authDomain: "mr-ai-tech-ansh.firebaseapp.com",
            projectId: "mr-ai-tech-ansh",
            storageBucket: "mr-ai-tech-ansh.firebasestorage.app",
            messagingSenderId: "463252192241",
            appId: "1:463252192241:web:11f8c5f41c5aa1f51fa250"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        onAuthStateChanged(auth, (user) => {
            const loginPage = document.getElementById('login-page');
            const dashboard = document.getElementById('dashboard');
            const userName = document.getElementById('user-name');

            if (user) {
                loginPage.classList.add('hidden');
                dashboard.classList.remove('hidden');
                userName.innerText = "Welcome, " + user.displayName;
            } else {
                loginPage.classList.remove('hidden');
                dashboard.classList.add('hidden');
            }
        });

        window.signInWithGoogle = function() {
            signInWithPopup(auth, provider).catch(err => alert("Login Error: " + err.message));
        }

        window.logout = function() {
            signOut(auth).then(() => location.reload());
        }
    </script>
</body>
</html>
