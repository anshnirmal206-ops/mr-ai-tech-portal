<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MR AI TECH ANSH | Official Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: radial-gradient(circle at center, #0d0d1a 0%, #05050a 100%);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }
        .neon-glow {
            text-shadow: 0 0 15px #3b82f6;
        }
        .btn-glow:hover {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.6);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div id="login-section" class="glass-card p-10 w-full max-w-md text-center">
        <h1 class="text-4xl font-extrabold mb-2 neon-glow text-blue-500">MR AI TECH</h1>
        <p class="text-gray-400 mb-8 uppercase tracking-widest text-sm font-semibold">Security Protocol</p>
        
        <div class="mb-8">
            <div class="w-20 h-20 bg-blue-600 rounded-full mx-auto flex items-center justify-center shadow-2xl">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
        </div>

        <button id="btn-login" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 px-8 rounded-xl w-full flex items-center justify-center gap-3 transition-all btn-glow">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" alt="G">
            Sign in with Google
        </button>
    </div>

    <div id="dashboard" class="hidden glass-card p-8 w-full max-w-5xl">
        <div class="flex flex-col md:flex-row items-center justify-between gap-6 mb-10 pb-6 border-b border-white/10">
            <div class="flex items-center gap-5">
                <img id="u-img" src="" class="w-16 h-16 rounded-2xl border-2 border-blue-500 shadow-xl">
                <div>
                    <h2 class="text-2xl font-bold" id="u-name">AI Developer</h2>
                    <p class="text-blue-400 text-sm" id="u-email"></p>
                </div>
            </div>
            <button id="btn-logout" class="bg-white/5 hover:bg-white/10 px-6 py-2 rounded-lg text-sm transition-all border border-white/10">Logout System</button>
        </div>

        <h3 class="text-xl font-semibold mb-6">Available Modules</h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white/5 p-6 rounded-2xl border border-white/5 hover:border-blue-500/50 transition-all">
                <div class="text-blue-500 mb-4 font-bold">#01 CAPCUT PACK</div>
                <p class="text-sm text-gray-400 mb-5">Exclusive transition presets for AI tech videos.</p>
                <button class="w-full bg-blue-600 py-2 rounded-lg text-sm font-bold">Download</button>
            </div>
            <div class="bg-white/5 p-6 rounded-2xl border border-white/5 hover:border-blue-500/50 transition-all">
                <div class="text-blue-500 mb-4 font-bold">#02 VPN CONFIG</div>
                <p class="text-sm text-gray-400 mb-5">Secure browsing setup for tech researchers.</p>
                <button class="w-full bg-blue-600 py-2 rounded-lg text-sm font-bold">Download</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // YE RAHA TERA EXACT CONFIG TERE SCREENSHOT SE
        const firebaseConfig = {
            apiKey: "AIzaSyCcaneVEU7cJgp_r_D9Il90fQchD7PN82o",
            authDomain: "mr-ai-tech-ansh.firebaseapp.com",
            projectId: "mr-ai-tech-ansh",
            storageBucket: "mr-ai-tech-ansh.firebasestorage.app",
            messagingSenderId: "463252192241",
            appId: "1:463252192241:web:11f8c5f41c5aa1f51fa250",
            measurementId: "G-FX81MEWRMJ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const btnLogin = document.getElementById('btn-login');
        const btnLogout = document.getElementById('btn-logout');
        const loginSec = document.getElementById('login-section');
        const dashboard = document.getElementById('dashboard');

        btnLogin.onclick = () => signInWithPopup(auth, provider).catch(e => console.log(e));
        btnLogout.onclick = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginSec.classList.add('hidden');
                dashboard.classList.remove('hidden');
                document.getElementById('u-name').innerText = user.displayName;
                document.getElementById('u-email').innerText = user.email;
                document.getElementById('u-img').src = user.photoURL;
            } else {
                loginSec.classList.remove('hidden');
                dashboard.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
