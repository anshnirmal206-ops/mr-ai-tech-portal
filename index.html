<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MR AT TECH ANSH | Official Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: radial-gradient(circle at center, #0d0d1a 0%, #05050a 100%);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="login-page" class="glass-card p-8 max-w-md w-full text-center">
        <h1 class="text-3xl font-bold mb-6">MR AI TECH PORTAL</h1>
        <p class="mb-8 text-gray-400">Login to access exclusive AI packs</p>
        <button onclick="signInWithGoogle()" class="bg-white text-black px-6 py-3 rounded-full font-bold hover:bg-gray-200 transition">
            Sign in with Google
        </button>
    </div>

    <div id="dashboard" class="glass-card p-8 max-w-4xl w-full text-center" style="display: none;">
        <h1 class="text-3xl font-bold mb-4">Welcome back, Creator!</h1>
        <p class="mb-8 text-green-400">Access Granted</p>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="p-4 border border-gray-700 rounded-xl">Pack 1: AI Overlays</div>
            <div class="p-4 border border-gray-700 rounded-xl">Pack 2: Editing Presets</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCcaneVEU7cJGp_r_D9Il90fQchD7PN82o",
            authDomain: "mr-ai-tech-ansh.firebaseapp.com",
            projectId: "mr-ai-tech-ansh",
            storageBucket: "mr-ai-tech-ansh.firebasestorage.app",
            messagingSenderId: "463252192241",
            appId: "1:463252192241:web:11f8c5f41c5aa1f51fa250",
            measurementId: "G-FX81MEWRMJ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        window.signInWithGoogle = function() {
            signInWithPopup(auth, provider)
                .then((result) => {
                    document.getElementById('login-page').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                })
                .catch((error) => {
                    alert("Error: " + error.message);
                });
        }
    </script>
</body>
</html>
