<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MR AI TECH ANSH | Official Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
        }
        body {
            background: radial-gradient(circle at 50% 50%, #0d0d1a 0%, #05050a 100%);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .neon-btn {
            position: relative;
            transition: all 0.3s ease;
            border: 1px solid var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        .neon-btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 30px var(--neon-blue);
            transform: translateY(-3px);
        }

        .yt-btn {
            border: 1px solid #ff0000;
            color: #ff0000;
        }

        .yt-btn:hover {
            background: #ff0000;
            color: #fff;
            box-shadow: 0 0 30px #ff0000;
        }

        .floating {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>

    <div id="login-page" class="glass-card p-10 max-w-md w-full text-center floating">
        <h1 class="orbitron text-4xl font-black mb-2 tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500">
            MR AI TECH
        </h1>
        <p class="text-gray-400 mb-8 uppercase tracking-[3px] text-xs">Access the Future of Editing</p>
        
        <button onclick="signInWithGoogle()" class="neon-btn w-full py-4 rounded-xl font-bold uppercase tracking-wider">
            Authorize via Google
        </button>
    </div>

    <div id="dashboard" class="glass-card p-10 max-w-2xl w-full text-center" style="display: none;">
        <div class="flex justify-between items-center mb-10">
            <div class="text-left">
                <h2 class="orbitron text-2xl font-bold text-cyan-400">COMMAND CENTER</h2>
                <p id="user-name" class="text-gray-400 text-sm italic">Authenticated User</p>
            </div>
            <button onclick="logout()" class="text-xs text-red-500 hover:underline">TERMINATE SESSION</button>
        </div>

        <div class="grid grid-cols-1 gap-6">
            <div class="p-6 bg-white/5 rounded-2xl border border-white/10 hover:border-cyan-400 transition-all">
                <h3 class="orbitron text-xl mb-4">EXCLUSIVE AI PACKS</h3>
                <p class="text-gray-400 text-sm mb-6">Yahan aapko mere saare premium AI overlays, presets aur editing files milengi.</p>
                <a href="https://drive.google.com/drive/folders/1qM21_U0wU3jyL1MFimTKtIadAyU_Vu1G?usp=drive_link" target="_blank" 
                   class="neon-btn inline-block px-10 py-3 rounded-lg font-bold">
                   📂 OPEN DRIVE FOLDER
                </a>
            </div>

            <div class="p-6 bg-white/5 rounded-2xl border border-white/10 hover:border-red-500 transition-all">
                <h3 class="orbitron text-xl mb-4">MY YOUTUBE CHANNEL</h3>
                <a href="https://www.youtube.com/@mraitechansh" target="_blank" 
                   class="yt-btn inline-block px-10 py-3 rounded-lg font-bold transition-all">
                   🔴 SUBSCRIBE NOW
                </a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCcaneVEU7cJGp_r_D9Il90fQchD7PN82o",
            authDomain: "mr-ai-tech-ansh.firebaseapp.com",
            projectId: "mr-ai-tech-ansh",
            storageBucket: "mr-ai-tech-ansh.firebasestorage.app",
            messagingSenderId: "463252192241",
            appId: "1:463252192241:web:11f8c5f41c5aa1f51fa250"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Check user state
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('user-name').innerText = "Active: " + user.displayName;
            }
        });

        window.signInWithGoogle = function() {
            signInWithPopup(auth, provider).catch(err => alert("Error: " + err.message));
        }

        window.logout = function() {
            signOut(auth).then(() => {
                location.reload();
            });
        }
    </script>
</body>
</html>
